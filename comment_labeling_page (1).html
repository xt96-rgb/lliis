<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>评论标注工作台</title>
  <script src="https://cdn.jsdelivr.net/npm/xlsx@0.18.5/dist/xlsx.full.min.js"></script>
  <style>
    :root {
      --bg: #f7f7f8;
      --panel: #ffffff;
      --panel-soft: #fbfbfc;
      --text: #1f2328;
      --muted: #6b7280;
      --line: #e5e7eb;
      --primary: #10a37f;
      --primary-hover: #0e8f70;
      --primary-soft: #e9f8f3;
      --danger: #ef4444;
      --danger-soft: #fef2f2;
      --warning-soft: #fff7ed;
      --shadow: 0 12px 36px rgba(15, 23, 42, 0.08);
      --radius-lg: 18px;
      --radius-md: 12px;
      --radius-sm: 9px;
    }

    * { box-sizing: border-box; }

    html { scroll-behavior: smooth; }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      color: var(--text);
      background: radial-gradient(circle at top left, #eefbf7 0, rgba(238, 251, 247, 0) 34%), var(--bg);
    }

    main {
      min-height: 100vh;
      max-width: 1280px;
      width: 100%;
      margin: 0 auto;
      padding: 28px 34px 44px;
    }

    .hero {
      display: grid;
      grid-template-columns: 1fr auto;
      gap: 22px;
      align-items: start;
      margin-bottom: 16px;
    }

    .brand-row {
      display: flex;
      align-items: center;
      gap: 12px;
      margin-bottom: 10px;
    }

    .brand-logo {
      width: 38px;
      height: 38px;
      border-radius: 12px;
      background: linear-gradient(135deg, #10a37f, #5eead4);
      display: grid;
      place-items: center;
      color: white;
      font-weight: 800;
      box-shadow: 0 10px 24px rgba(16, 163, 127, 0.22);
    }

    .hero h1 {
      margin: 0;
      font-size: 28px;
      letter-spacing: -0.03em;
    }

    .hero p {
      margin: 8px 0 0;
      color: var(--muted);
      line-height: 1.7;
      max-width: 760px;
    }

    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      justify-content: flex-end;
    }

    input, textarea, select, button { font: inherit; }

    .input, .select, .textarea {
      width: 100%;
      border: 1px solid var(--line);
      background: #fff;
      border-radius: var(--radius-sm);
      padding: 10px 11px;
      outline: none;
      transition: border-color 0.16s, box-shadow 0.16s;
    }

    .textarea {
      resize: vertical;
      min-height: 82px;
      line-height: 1.6;
    }

    .input:focus, .select:focus, .textarea:focus {
      border-color: rgba(16, 163, 127, 0.6);
      box-shadow: 0 0 0 3px rgba(16, 163, 127, 0.1);
    }

    .btn {
      border: 1px solid transparent;
      border-radius: var(--radius-sm);
      padding: 10px 13px;
      background: var(--panel);
      color: var(--text);
      cursor: pointer;
      transition: transform 0.12s, background 0.16s, border-color 0.16s, color 0.16s;
      white-space: nowrap;
      position: relative;
      overflow: hidden;
    }

    .btn:hover { transform: translateY(-1px); }

    .btn-primary {
      background: var(--primary);
      color: white;
    }

    .btn-primary:hover { background: var(--primary-hover); }

    .btn-soft {
      border-color: var(--line);
      background: var(--panel-soft);
    }

    .btn-danger {
      color: var(--danger);
      background: var(--danger-soft);
      border-color: #fecaca;
    }

    .btn-mini {
      padding: 6px 9px;
      font-size: 12px;
    }

    .upload-btn input[type="file"] {
      position: absolute;
      inset: 0;
      opacity: 0;
      cursor: pointer;
    }

    .top-status {
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 12px;
      margin-bottom: 14px;
      color: var(--muted);
      font-size: 13px;
    }

    .status-line {
      min-height: 20px;
      color: var(--muted);
      font-size: 13px;
    }

    .panel {
      background: rgba(255, 255, 255, 0.8);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.045);
      padding: 16px;
      margin-bottom: 16px;
    }

    .panel-title {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin-bottom: 12px;
    }

    .panel-title h2 {
      margin: 0;
      font-size: 16px;
    }

    .tag-input-row {
      display: grid;
      grid-template-columns: minmax(240px, 360px) auto 1fr;
      gap: 8px;
      align-items: center;
    }

    .tag-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      margin-top: 12px;
    }

    .tag-pill {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      padding: 7px 10px;
      border-radius: 999px;
      background: var(--primary-soft);
      color: #067a60;
      font-size: 13px;
      border: 1px solid #c8f0e4;
    }

    .tag-pill button {
      border: 0;
      background: transparent;
      color: inherit;
      cursor: pointer;
      padding: 0;
      font-size: 15px;
      line-height: 1;
    }

    .label-choice-list {
      display: flex;
      flex-wrap: wrap;
      gap: 8px;
      padding: 10px;
      border: 1px solid var(--line);
      border-radius: var(--radius-md);
      background: var(--panel-soft);
    }

    .label-choice {
      border: 1px solid var(--line);
      border-radius: 999px;
      padding: 8px 12px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      font-size: 13px;
      transition: background 0.16s, color 0.16s, border-color 0.16s, box-shadow 0.16s, transform 0.12s;
    }

    .label-choice:hover {
      transform: translateY(-1px);
      border-color: rgba(16, 163, 127, 0.45);
      background: #f7fffc;
    }

    .label-choice.active {
      border-color: rgba(16, 163, 127, 0.82);
      background: var(--primary);
      color: #fff;
      box-shadow: 0 8px 18px rgba(16, 163, 127, 0.18);
    }

    .stats {
      display: grid;
      grid-template-columns: repeat(3, minmax(0, 1fr));
      gap: 12px;
      margin-bottom: 18px;
    }

    .stat-card {
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--panel);
      padding: 18px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.045);
    }

    .stat-card.clickable {
      cursor: pointer;
      transition: transform 0.14s, border-color 0.14s, background 0.14s;
    }

    .stat-card.clickable:hover {
      transform: translateY(-2px);
      border-color: rgba(16, 163, 127, 0.42);
      background: #f7fffc;
    }

    .stat-card span {
      color: var(--muted);
      font-size: 13px;
    }

    .stat-card b {
      display: block;
      font-size: 30px;
      margin-top: 6px;
      letter-spacing: -0.03em;
    }

    .stat-card small {
      display: block;
      color: var(--muted);
      margin-top: 8px;
      font-size: 12px;
    }


    .filter-row {
      display: grid;
      grid-template-columns: 1fr 180px 180px;
      gap: 10px;
      margin: 18px 0;
    }

    .pagination {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 12px;
      margin: 14px 0;
      padding: 12px 14px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: rgba(255, 255, 255, 0.78);
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.035);
    }

    .pagination-info {
      color: var(--muted);
      font-size: 13px;
      line-height: 1.5;
    }

    .pagination-actions {
      display: flex;
      align-items: center;
      flex-wrap: wrap;
      gap: 8px;
      justify-content: flex-end;
    }

    .page-btn {
      min-width: 38px;
      padding: 8px 10px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: #fff;
      color: var(--text);
      cursor: pointer;
      transition: background 0.16s, border-color 0.16s, color 0.16s, transform 0.12s;
    }

    .page-btn:hover:not(:disabled) {
      transform: translateY(-1px);
      border-color: rgba(16, 163, 127, 0.45);
      background: #f7fffc;
    }

    .page-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: #fff;
    }

    .page-btn:disabled {
      cursor: not-allowed;
      opacity: 0.45;
    }

    .empty {
      border: 1px solid var(--line);
      background: rgba(255, 255, 255, 0.74);
      border-radius: 24px;
      padding: 46px 20px;
      text-align: center;
      color: var(--muted);
    }

    .empty b {
      color: var(--text);
      display: block;
      margin-bottom: 8px;
      font-size: 18px;
    }

    .card-list {
      display: grid;
      gap: 14px;
    }

    .comment-card {
      background: var(--panel);
      border: 1px solid var(--line);
      border-radius: 22px;
      box-shadow: 0 8px 22px rgba(15, 23, 42, 0.045);
      padding: 18px;
      display: grid;
      gap: 14px;
      scroll-margin-top: 22px;
      transition: box-shadow 0.2s, border-color 0.2s, transform 0.2s;
    }

    .comment-card.focused {
      border-color: rgba(16, 163, 127, 0.68);
      box-shadow: 0 0 0 4px rgba(16, 163, 127, 0.12), 0 12px 28px rgba(15, 23, 42, 0.08);
      transform: translateY(-2px);
    }

    .card-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: flex-start;
    }

    .index-badge {
      color: var(--muted);
      font-size: 12px;
      background: #f3f4f6;
      border-radius: 999px;
      padding: 5px 9px;
    }

    .card-body-layout {
      display: grid;
      grid-template-columns: minmax(0, 1fr) 320px;
      gap: 14px;
      align-items: stretch;
    }

    .main-content-stack {
      display: grid;
      grid-template-rows: auto 1fr;
      gap: 12px;
      min-width: 0;
    }

    .field-box {
      border: 1px solid var(--line);
      border-radius: 16px;
      padding: 13px;
      background: var(--panel-soft);
      min-width: 0;
    }

    .field-box.title-box {
      background: #f8fafc;
      border-left: 4px solid #64748b;
    }

    .field-box.comment-box {
      background: #f0fdf9;
      border-left: 4px solid var(--primary);
    }

    .field-box.aux-box {
      background: var(--warning-soft);
      border-color: #fed7aa;
    }

    .field-label {
      display: inline-flex;
      align-items: center;
      gap: 6px;
      color: var(--muted);
      font-size: 12px;
      font-weight: 700;
      margin-bottom: 8px;
    }

    .field-value {
      white-space: pre-wrap;
      word-break: break-word;
      line-height: 1.65;
      font-size: 14px;
    }

    .aux-column {
      display: grid;
      grid-template-rows: repeat(3, minmax(0, 1fr));
      gap: 10px;
    }

    .aux-placeholder {
      border: 1px dashed var(--line);
      border-radius: 16px;
      background: #fafafa;
      color: #a1a1aa;
      display: grid;
      place-items: center;
      min-height: 82px;
      font-size: 12px;
    }

    .annotation-stack {
      display: grid;
      grid-template-columns: 1fr;
      gap: 10px;
      padding-top: 12px;
      border-top: 1px solid var(--line);
    }

    .toast {
      position: fixed;
      right: 24px;
      bottom: 24px;
      background: #111827;
      color: #fff;
      padding: 12px 14px;
      border-radius: 12px;
      box-shadow: var(--shadow);
      opacity: 0;
      transform: translateY(12px);
      pointer-events: none;
      transition: all 0.22s ease;
      z-index: 10;
      max-width: 360px;
      line-height: 1.5;
    }

    .toast.show {
      opacity: 1;
      transform: translateY(0);
    }

    @media (max-width: 1080px) {
      .card-body-layout { grid-template-columns: 1fr; }
      .aux-column {
        grid-template-rows: none;
        grid-template-columns: repeat(3, minmax(0, 1fr));
      }
    }

    @media (max-width: 900px) {
      main { padding: 22px 16px 36px; }
      .hero, .filter-row, .tag-input-row { grid-template-columns: 1fr; }
      .toolbar { justify-content: flex-start; }
      .top-status { align-items: flex-start; flex-direction: column; }
    }

    @media (max-width: 720px) {
      .stats, .aux-column { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>
  <main>
    <header class="hero">
      <div>
        <div class="brand-row">
          <div class="brand-logo">标</div>
          <h1>批量评论标注</h1>
        </div>
        <p>下载模板后录入「标题、评论」及最多 3 个辅助字段，上传 Excel 后以卡片方式逐条打标签；点击标签即代表该评论已完成标注，理由可选填。</p>
      </div>
      <div class="toolbar">
        <button class="btn btn-soft" id="downloadTemplateBtn">下载模板</button>
        <label class="btn btn-primary upload-btn">
          上传 Excel
          <input id="fileInput" type="file" accept=".xlsx,.xls" />
        </label>
        <button class="btn btn-primary" id="exportBtn">导出结果</button>
        <button class="btn btn-danger" id="clearBtn">清空数据</button>
      </div>
    </header>

    <div class="top-status">
      <div id="fileName" class="status-line">尚未上传文件</div>
      <div>支持 .xlsx / .xls，首行必须包含「标题」「评论」</div>
    </div>

    <section class="panel">
      <div class="panel-title">
        <h2>标签管理</h2>
      </div>
      <div class="tag-input-row">
        <input id="tagInput" class="input" placeholder="输入新标签，如 色情" />
        <button class="btn btn-primary" id="addTagBtn">添加标签</button>
        <div></div>
      </div>
      <div id="tagList" class="tag-list"></div>
    </section>

    <section class="stats">
      <div class="stat-card">
        <span>总量</span>
        <b id="totalCount">0</b>
        <small>当前成功导入的评论数量</small>
      </div>
      <div class="stat-card">
        <span>已标注</span>
        <b id="labeledCount">0</b>
        <small>已打标签的评论数量</small>
      </div>
      <div class="stat-card clickable" id="unlabeledStatCard" title="点击跳转到下一条未标注评论">
        <span>未标注</span>
        <b id="unlabeledCount">0</b>
        <small id="unlabeledHint">点击后由上而下逐条定位</small>
      </div>
    </section>

    <section class="filter-row">
      <input id="searchInput" class="input" placeholder="搜索标题、评论或辅助字段" />
      <select id="statusFilter" class="select">
        <option value="all">全部状态</option>
        <option value="labeled">已标注</option>
        <option value="unlabeled">未标注</option>
      </select>
      <select id="tagFilter" class="select">
        <option value="all">全部标签</option>
      </select>
    </section>

    <section id="topPagination" class="pagination" style="display:none;"></section>

    <section id="cardContainer" class="card-list">
      <div class="empty">
        <b>暂无数据</b>
        上传 Excel 后，这里会以卡片形式展示标题、评论和辅助信息。
      </div>
    </section>

    <section id="bottomPagination" class="pagination" style="display:none;"></section>
  </main>

  <div id="toast" class="toast"></div>

  <script>
    const DEFAULT_TAGS = ["正常", "涉政", "色情", "谩骂", "广告", "违禁", "灌水", "竞品", "其他"];

    let tags = [...DEFAULT_TAGS];
    let rows = [];
    let auxHeaders = [];
    let nextUnlabeledCursor = 0;
    let currentPage = 1;
    const PAGE_SIZE = 20;

    const els = {
      tagInput: document.getElementById("tagInput"),
      addTagBtn: document.getElementById("addTagBtn"),
      tagList: document.getElementById("tagList"),
      downloadTemplateBtn: document.getElementById("downloadTemplateBtn"),
      exportBtn: document.getElementById("exportBtn"),
      clearBtn: document.getElementById("clearBtn"),
      fileInput: document.getElementById("fileInput"),
      fileName: document.getElementById("fileName"),
      totalCount: document.getElementById("totalCount"),
      labeledCount: document.getElementById("labeledCount"),
      unlabeledCount: document.getElementById("unlabeledCount"),
      unlabeledHint: document.getElementById("unlabeledHint"),
      unlabeledStatCard: document.getElementById("unlabeledStatCard"),
      searchInput: document.getElementById("searchInput"),
      statusFilter: document.getElementById("statusFilter"),
      tagFilter: document.getElementById("tagFilter"),
      topPagination: document.getElementById("topPagination"),
      bottomPagination: document.getElementById("bottomPagination"),
      cardContainer: document.getElementById("cardContainer"),
      toast: document.getElementById("toast")
    };

    function showToast(message) {
      els.toast.textContent = message;
      els.toast.classList.add("show");
      window.clearTimeout(showToast.timer);
      showToast.timer = window.setTimeout(() => els.toast.classList.remove("show"), 1800);
    }

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#039;");
    }

    function normalizeCell(value) {
      if (value === undefined || value === null) return "";
      return String(value).trim();
    }

    function renderTags() {
      els.tagList.innerHTML = tags.map(tag => `
        <span class="tag-pill">
          ${escapeHtml(tag)}
          <button type="button" title="删除标签" data-remove-tag="${escapeHtml(tag)}">×</button>
        </span>
      `).join("");

      const tagOptions = [`<option value="all">全部标签</option>`]
        .concat(tags.map(tag => `<option value="${escapeHtml(tag)}">${escapeHtml(tag)}</option>`));
      const currentFilter = els.tagFilter.value;
      els.tagFilter.innerHTML = tagOptions.join("");
      els.tagFilter.value = tags.includes(currentFilter) ? currentFilter : "all";
    }

    function addTag() {
      const value = els.tagInput.value.trim();
      if (!value) return showToast("请输入标签名称");
      if (tags.includes(value)) return showToast("该标签已存在");
      tags.push(value);
      els.tagInput.value = "";
      renderTags();
      renderCards();
      showToast("标签已添加");
    }

    function removeTag(tag) {
      tags = tags.filter(item => item !== tag);
      renderTags();
      renderCards();
      showToast("标签已删除");
    }

    function downloadTemplate() {
      const templateRows = [
        ["标题", "评论", "辅助信息1", "辅助信息2", "辅助信息3"],
        ["示例标题：新品发布讨论", "这个功能看起来不错，想试试", "用户等级：普通用户", "来源：社区评论", "发布时间：2026-05-22"]
      ];
      const ws = XLSX.utils.aoa_to_sheet(templateRows);
      ws["!cols"] = [{ wch: 28 }, { wch: 46 }, { wch: 24 }, { wch: 24 }, { wch: 24 }];
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "评论标注模板");
      XLSX.writeFile(wb, "评论标注模板.xlsx");
    }

    async function handleFile(file) {
      if (!file) return;
      if (!/\.(xlsx|xls)$/i.test(file.name)) return showToast("请上传 .xlsx 或 .xls 文件");

      const data = await file.arrayBuffer();
      const workbook = XLSX.read(data, { type: "array" });
      const sheet = workbook.Sheets[workbook.SheetNames[0]];
      const matrix = XLSX.utils.sheet_to_json(sheet, { header: 1, defval: "" });
      parseMatrix(matrix, file.name);
    }

    function parseMatrix(matrix, fileName) {
      const nonEmptyRows = matrix.filter(row => row.some(cell => normalizeCell(cell)));
      if (nonEmptyRows.length < 2) return showToast("Excel 至少需要包含表头和 1 条数据");

      const headers = nonEmptyRows[0].map(normalizeCell);
      const titleIndex = headers.indexOf("标题");
      const commentIndex = headers.indexOf("评论");
      if (titleIndex === -1 || commentIndex === -1) return showToast("模板格式错误：必须包含「标题」「评论」两列");

      auxHeaders = headers
        .filter((header, index) => header && index !== titleIndex && index !== commentIndex)
        .slice(0, 3);

      if (headers.filter((header, index) => header && index !== titleIndex && index !== commentIndex).length > 3) {
        showToast("检测到超过 3 个辅助字段，已自动只读取前 3 个");
      }

      rows = nonEmptyRows.slice(1).map((row, index) => {
        const aux = {};
        auxHeaders.forEach(header => {
          const sourceIndex = headers.indexOf(header);
          aux[header] = normalizeCell(row[sourceIndex]);
        });
        return {
          id: crypto.randomUUID ? crypto.randomUUID() : `${Date.now()}-${index}`,
          index: index + 1,
          title: normalizeCell(row[titleIndex]),
          comment: normalizeCell(row[commentIndex]),
          aux,
          label: "",
          reason: ""
        };
      }).filter(item => item.title || item.comment || Object.values(item.aux).some(Boolean));

      nextUnlabeledCursor = 0;
      currentPage = 1;
      els.fileName.textContent = `已上传：${fileName}`;
      renderStats();
      renderCards();
      showToast(`成功导入 ${rows.length} 条数据`);
    }

    function getFilteredRows() {
      const keyword = els.searchInput.value.trim().toLowerCase();
      const status = els.statusFilter.value;
      const tag = els.tagFilter.value;

      return rows.filter(row => {
        const haystack = [row.title, row.comment, ...Object.values(row.aux)].join(" ").toLowerCase();
        const keywordMatched = !keyword || haystack.includes(keyword);
        const statusMatched = status === "all" || (status === "labeled" ? !!row.label : !row.label);
        const tagMatched = tag === "all" || row.label === tag;
        return keywordMatched && statusMatched && tagMatched;
      });
    }

    function renderStats() {
      const labeled = rows.filter(row => row.label).length;
      const unlabeled = rows.length - labeled;
      els.totalCount.textContent = rows.length;
      els.labeledCount.textContent = labeled;
      els.unlabeledCount.textContent = unlabeled;
      els.unlabeledHint.textContent = unlabeled ? "点击后由上而下逐条定位" : "已全部完成标注";
    }

    function getPageCount(filteredRows = getFilteredRows()) {
      return Math.max(1, Math.ceil(filteredRows.length / PAGE_SIZE));
    }

    function getCurrentPageRows(filteredRows) {
      const pageCount = getPageCount(filteredRows);
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      const start = (currentPage - 1) * PAGE_SIZE;
      return filteredRows.slice(start, start + PAGE_SIZE);
    }

    function renderPagination(filteredRows) {
      const total = filteredRows.length;
      if (!rows.length || !total) {
        els.topPagination.style.display = "none";
        els.bottomPagination.style.display = "none";
        els.topPagination.innerHTML = "";
        els.bottomPagination.innerHTML = "";
        return;
      }

      const pageCount = getPageCount(filteredRows);
      const start = (currentPage - 1) * PAGE_SIZE + 1;
      const end = Math.min(currentPage * PAGE_SIZE, total);
      const pages = buildPageNumbers(currentPage, pageCount);
      const pageButtons = pages.map(page => page === "..."
        ? `<span class="pagination-info">...</span>`
        : `<button class="page-btn ${page === currentPage ? "active" : ""}" data-page="${page}">${page}</button>`
      ).join("");

      const html = `
        <div class="pagination-info">每页 ${PAGE_SIZE} 条｜当前展示 ${start}-${end} 条｜共 ${total} 条，${pageCount} 页</div>
        <div class="pagination-actions">
          <button class="page-btn" data-page="prev" ${currentPage === 1 ? "disabled" : ""}>上一页</button>
          ${pageButtons}
          <button class="page-btn" data-page="next" ${currentPage === pageCount ? "disabled" : ""}>下一页</button>
        </div>
      `;
      els.topPagination.innerHTML = html;
      els.bottomPagination.innerHTML = html;
      els.topPagination.style.display = "flex";
      els.bottomPagination.style.display = pageCount > 1 ? "flex" : "none";
    }

    function buildPageNumbers(page, pageCount) {
      if (pageCount <= 7) return Array.from({ length: pageCount }, (_, index) => index + 1);
      const pages = [1];
      if (page > 4) pages.push("...");
      const start = Math.max(2, page - 1);
      const end = Math.min(pageCount - 1, page + 1);
      for (let i = start; i <= end; i++) pages.push(i);
      if (page < pageCount - 3) pages.push("...");
      pages.push(pageCount);
      return pages;
    }

    function changePage(target) {
      const filtered = getFilteredRows();
      const pageCount = getPageCount(filtered);
      if (target === "prev") currentPage -= 1;
      else if (target === "next") currentPage += 1;
      else currentPage = Number(target);
      currentPage = Math.min(Math.max(1, currentPage), pageCount);
      renderCards();
      els.cardContainer.scrollIntoView({ behavior: "smooth", block: "start" });
    }

    function renderCards() {
      renderStats();
      const filtered = getFilteredRows();
      if (!rows.length) {
        renderPagination(filtered);
        els.cardContainer.innerHTML = `
          <div class="empty">
            <b>暂无数据</b>
            上传 Excel 后，这里会以卡片形式展示标题、评论和辅助信息。
          </div>
        `;
        return;
      }

      if (!filtered.length) {
        renderPagination(filtered);
        els.cardContainer.innerHTML = `
          <div class="empty">
            <b>没有匹配结果</b>
            请调整搜索关键词、标注状态或标签筛选条件。
          </div>
        `;
        return;
      }

      const pageRows = getCurrentPageRows(filtered);
      renderPagination(filtered);
      els.cardContainer.innerHTML = pageRows.map(row => renderCard(row)).join("");
    }

    function renderCard(row) {
      const auxEntries = Object.entries(row.aux).filter(([, value]) => normalizeCell(value));
      const auxHtml = auxEntries.map(([key, value]) => `
        <div class="field-box aux-box">
          <div class="field-label">辅助字段｜${escapeHtml(key)}</div>
          <div class="field-value">${escapeHtml(value)}</div>
        </div>
      `).join("");

      const placeholderCount = Math.max(0, 3 - auxEntries.length);
      const placeholders = Array.from({ length: placeholderCount }).map(() => `<div class="aux-placeholder">辅助字段为空</div>`).join("");

      const labelButtons = tags.map(tag => `
        <button
          type="button"
          class="label-choice ${row.label === tag ? "active" : ""}"
          data-label-for="${row.id}"
          data-label-value="${escapeHtml(tag)}"
        >${escapeHtml(tag)}</button>
      `).join("");

      return `
        <article class="comment-card" id="card-${row.id}" data-id="${row.id}">
          <div class="card-head">
            <span class="index-badge">第 ${row.index} 条${row.label ? ` · 已标注：${escapeHtml(row.label)}` : " · 未标注"}</span>
            <button class="btn btn-soft btn-mini" data-clear-row="${row.id}">清空本条标注</button>
          </div>

          <div class="card-body-layout">
            <div class="main-content-stack">
              <div class="field-box title-box">
                <div class="field-label">标题</div>
                <div class="field-value">${escapeHtml(row.title || "未填写标题")}</div>
              </div>
              <div class="field-box comment-box">
                <div class="field-label">评论</div>
                <div class="field-value">${escapeHtml(row.comment || "未填写评论")}</div>
              </div>
            </div>
            <div class="aux-column">
              ${auxHtml || placeholders ? auxHtml + placeholders : `<div class="aux-placeholder">无辅助信息</div>`}
            </div>
          </div>

          <div class="annotation-stack">
            <div class="label-choice-list" aria-label="选择标签">
              ${labelButtons || `<span class="status-line">请先在标签管理中添加标签</span>`}
            </div>
            <textarea class="textarea" data-reason-for="${row.id}" placeholder="选填：填写标注理由，便于复核和沉淀样例">${escapeHtml(row.reason)}</textarea>
          </div>
        </article>
      `;
    }

    function updateRowReason(id) {
      const row = rows.find(item => item.id === id);
      if (!row) return;
      const reasonEl = document.querySelector(`[data-reason-for="${id}"]`);
      row.reason = reasonEl ? reasonEl.value.trim() : row.reason;
    }

    function selectRowLabel(id, label) {
      updateRowReason(id);
      const row = rows.find(item => item.id === id);
      if (!row) return;
      row.label = row.label === label ? "" : label;
      renderCards();
      showToast(row.label ? `已标注：${row.label}` : "已取消标签");
    }

    function clearRowAnnotation(id) {
      const row = rows.find(item => item.id === id);
      if (!row) return;
      row.label = "";
      row.reason = "";
      renderCards();
      showToast("已清空本条标注");
    }

    function jumpToNextUnlabeled() {
      if (!rows.length) return showToast("暂无数据");
      const unlabeledRows = rows.filter(row => !row.label);
      if (!unlabeledRows.length) return showToast("所有评论均已完成标注");

      let filtered = getFilteredRows();
      const currentVisibleIds = new Set(filtered.map(row => row.id));
      let candidates = unlabeledRows.filter(row => currentVisibleIds.has(row.id));

      if (!candidates.length) {
        els.statusFilter.value = "all";
        els.tagFilter.value = "all";
        els.searchInput.value = "";
        filtered = getFilteredRows();
        candidates = rows.filter(row => !row.label);
      }

      if (nextUnlabeledCursor >= candidates.length) nextUnlabeledCursor = 0;
      const target = candidates[nextUnlabeledCursor];
      nextUnlabeledCursor += 1;

      const targetIndex = filtered.findIndex(row => row.id === target.id);
      if (targetIndex >= 0) {
        currentPage = Math.floor(targetIndex / PAGE_SIZE) + 1;
      }
      renderCards();

      window.requestAnimationFrame(() => {
        const card = document.getElementById(`card-${target.id}`);
        if (!card) return;
        document.querySelectorAll(".comment-card.focused").forEach(el => el.classList.remove("focused"));
        card.classList.add("focused");
        card.scrollIntoView({ behavior: "smooth", block: "center" });
        window.setTimeout(() => card.classList.remove("focused"), 1800);
      });
    }

    function exportResult() {
      if (!rows.length) return showToast("暂无可导出的数据");
      const exportRows = rows.map(row => ({
        标题: row.title,
        评论: row.comment,
        ...row.aux,
        标签: row.label,
        理由: row.reason
      }));
      const ws = XLSX.utils.json_to_sheet(exportRows);
      ws["!cols"] = Object.keys(exportRows[0]).map(key => ({ wch: Math.max(12, Math.min(42, key.length + 12)) }));
      const wb = XLSX.utils.book_new();
      XLSX.utils.book_append_sheet(wb, ws, "标注结果");
      XLSX.writeFile(wb, "评论标注结果.xlsx");
    }

    function clearAll() {
      if (!rows.length) return showToast("当前没有数据需要清空");
      if (!window.confirm("确认清空当前上传数据和标注结果吗？")) return;
      rows = [];
      auxHeaders = [];
      nextUnlabeledCursor = 0;
      currentPage = 1;
      els.fileInput.value = "";
      els.fileName.textContent = "尚未上传文件";
      els.searchInput.value = "";
      els.statusFilter.value = "all";
      els.tagFilter.value = "all";
      renderStats();
      renderCards();
      showToast("当前数据已清空");
    }

    els.addTagBtn.addEventListener("click", addTag);
    els.tagInput.addEventListener("keydown", event => {
      if (event.key === "Enter") addTag();
    });

    els.tagList.addEventListener("click", event => {
      const tag = event.target.dataset.removeTag;
      if (tag) removeTag(tag);
    });

    els.downloadTemplateBtn.addEventListener("click", downloadTemplate);
    els.exportBtn.addEventListener("click", exportResult);
    els.clearBtn.addEventListener("click", clearAll);
    els.fileInput.addEventListener("change", event => handleFile(event.target.files[0]));
    els.unlabeledStatCard.addEventListener("click", jumpToNextUnlabeled);

    els.searchInput.addEventListener("input", () => {
      nextUnlabeledCursor = 0;
      currentPage = 1;
      renderCards();
    });
    els.statusFilter.addEventListener("change", () => {
      nextUnlabeledCursor = 0;
      currentPage = 1;
      renderCards();
    });
    els.tagFilter.addEventListener("change", () => {
      nextUnlabeledCursor = 0;
      currentPage = 1;
      renderCards();
    });

    [els.topPagination, els.bottomPagination].forEach(pagination => {
      pagination.addEventListener("click", event => {
        const page = event.target.dataset.page;
        if (page) changePage(page);
      });
    });

    els.cardContainer.addEventListener("input", event => {
      const id = event.target.dataset.reasonFor;
      if (id) updateRowReason(id);
    });

    els.cardContainer.addEventListener("click", event => {
      const labelId = event.target.dataset.labelFor;
      const labelValue = event.target.dataset.labelValue;
      const clearId = event.target.dataset.clearRow;
      if (labelId && labelValue) selectRowLabel(labelId, labelValue);
      if (clearId) clearRowAnnotation(clearId);
    });

    renderTags();
    renderStats();
  </script>
</body>
</html>
